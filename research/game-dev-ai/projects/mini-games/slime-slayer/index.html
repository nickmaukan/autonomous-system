<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slime Slayer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  canvas {
    border: 2px solid #333;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
</style>
</head>
<body>
<canvas id="game" width="800" height="500"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 500;
const GROUND = 420;
const GRAVITY = 0.6;
const JUMP_FORCE = -13;
const MOVE_SPEED = 4;
const SPRITE_BASE = '/Users/nickmaukan/AutonomousSystem/research/game-dev-ai/projects/02-pixel-art-asset-pack/assets/';

// ─── Audio ───────────────────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, dur, type = 'square', vol = 0.1) {
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
const sfx = {
  attack: () => beep(300, 0.1, 'sawtooth', 0.08),
  hit: () => { beep(150, 0.15, 'sawtooth', 0.1); },
  jump: () => beep(400, 0.1, 'square', 0.06),
  killSlime: () => { beep(600, 0.1, 'square', 0.08); setTimeout(()=>beep(800, 0.08, 'square', 0.06), 60); },
  killGoblin: () => { beep(500, 0.08, 'square', 0.08); setTimeout(()=>beep(700, 0.08, 'square', 0.08), 50); setTimeout(()=>beep(900, 0.12, 'square', 0.06), 100); },
  gameover: () => { beep(300, 0.3, 'sawtooth', 0.1); setTimeout(()=>beep(200, 0.3, 'sawtooth', 0.08), 200); setTimeout(()=>beep(100, 0.5, 'sawtooth', 0.06), 400); },
  start: () => { beep(400, 0.1, 'square', 0.08); setTimeout(()=>beep(500, 0.1, 'square', 0.08), 100); setTimeout(()=>beep(700, 0.15, 'square', 0.08), 200); },
};

// ─── Sprite Loader ────────────────────────────────────────────────────────────
function loadSprite(path, frameW, frameH, numFrames) {
  const img = new Image();
  img.src = path;
  return { img, frameW, frameH, numFrames, loaded: false, path };
}
const SPRITES = {
  knight: loadSprite(SPRITE_BASE + 'characters/knight_walk_v2.png', 64, 64, 8),
  slime: loadSprite(SPRITE_BASE + 'characters/slime_fixed.png', 32, 32, 4),
  goblinIdle: loadSprite(SPRITE_BASE + 'enemies/goblin_idle_fixed.png', 32, 32, 4),
  goblinAttack: loadSprite(SPRITE_BASE + 'enemies/goblin_attack.png', 32, 32, 6),
  goblinWalk: loadSprite(SPRITE_BASE + 'enemies/goblin_walk.png', 32, 32, 6),
};

// ─── Input ────────────────────────────────────────────────────────────────────
const keys = {};
const keysJustPressed = {};
document.addEventListener('keydown', e => {
  if (!keys[e.code]) keysJustPressed[e.code] = true;
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','ShiftLeft','ShiftRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
function clearJustPressed() { for (let k in keysJustPressed) delete keysJustPressed[k]; }

function isLeft() { return keys['ArrowLeft'] || keys['KeyA']; }
function isRight() { return keys['ArrowRight'] || keys['KeyD']; }
function isJump() { return keysJustPressed['ShiftLeft'] || keysJustPressed['ShiftRight'] || keysJustPressed['ArrowUp'] || keysJustPressed['KeyW']; }
function isAttack() { return keysJustPressed['Space'] || keysJustPressed['KeyZ']; }
function isStart() { return keysJustPressed['Space'] || keysJustPressed['Enter']; }

// ─── Particle System ───────────────────────────────────────────────────────────
let particles = [];
function spawnParticles(x, y, color, count = 6) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.8) * 5,
      life: 1,
      color,
      size: 3 + Math.random() * 4,
    });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.2;
    p.life -= 0.03;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ─── Player ────────────────────────────────────────────────────────────────────
class Player {
  constructor() {
    this.x = 100; this.y = GROUND - 64;
    this.w = 48; this.h = 60;
    this.vx = 0; this.vy = 0;
    this.facing = 1;
    this.state = 'idle';
    this.frame = 0;
    this.frameTimer = 0;
    this.attacking = false;
    this.attackTimer = 0;
    this.attackCooldown = 0;
    this.invincible = 0;
    this.onGround = true;
  }

  update() {
    // Movement
    this.vx = 0;
    if (isLeft()) { this.vx = -MOVE_SPEED; this.facing = -1; }
    if (isRight()) { this.vx = MOVE_SPEED; this.facing = 1; }

    // Jump
    if (isJump() && this.onGround) {
      this.vy = JUMP_FORCE;
      this.onGround = false;
      sfx.jump();
    }

    // Attack
    if (isAttack() && this.attackCooldown <= 0 && !this.attacking) {
      this.attacking = true;
      this.attackTimer = 20;
      this.attackCooldown = 30;
      sfx.attack();
    }
    if (this.attacking) { this.attackTimer--; if (this.attackTimer <= 0) this.attacking = false; }
    if (this.attackCooldown > 0) this.attackCooldown--;

    // Gravity
    this.vy += GRAVITY;
    this.y += this.vy;
    this.x += this.vx;

    // Ground collision
    if (this.y + this.h >= GROUND) {
      this.y = GROUND - this.h;
      this.vy = 0;
      this.onGround = true;
    }

    // Screen bounds
    if (this.x < 0) this.x = 0;
    if (this.x + this.w > W) this.x = W - this.w;

    // State
    if (this.attacking) this.state = 'attack';
    else if (this.vx !== 0) this.state = 'walk';
    else this.state = 'idle';

    // Animation
    this.frameTimer++;
    const frameSpeed = this.state === 'walk' ? 6 : 10;
    if (this.frameTimer >= frameSpeed) {
      this.frameTimer = 0;
      const total = this.state === 'attack' ? 3 : 8;
      this.frame = (this.frame + 1) % total;
    }

    if (this.invincible > 0) this.invincible--;
  }

  getAttackBox() {
    if (!this.attacking || this.attackTimer < 10) return null;
    const reach = 50;
    return {
      x: this.facing === 1 ? this.x + this.w : this.x - reach,
      y: this.y + 10,
      w: reach,
      h: this.h - 20,
    };
  }

  takeDamage() {
    if (this.invincible > 0) return;
    this.invincible = 60;
    this.lives--;  // Decrement lives on hit
    sfx.hit();
    spawnParticles(this.x + this.w/2, this.y + this.h/2, '#ff4444', 8);
  }

  draw() {
    const spr = SPRITES.knight;
    if (this.invincible > 0 && Math.floor(this.invincible / 4) % 2 === 0) return;

    if (spr.loaded && spr.img.complete) {
      ctx.save();
      ctx.translate(this.x + this.w/2, this.y + this.h/2);
      ctx.scale(this.facing, 1);
      ctx.translate(-this.w/2, -this.h/2);

      let sx = 0;
      if (this.state === 'walk') {
        sx = this.frame % 8;
      } else if (this.state === 'attack') {
        sx = Math.min(this.frame % 3, 2);
      }

      ctx.drawImage(spr.img,
        sx * spr.frameW, 0, spr.frameW, spr.frameH,
        0, 0, this.w, this.h
      );
      ctx.restore();
    } else {
      // Placeholder
      ctx.fillStyle = '#4a90d9';
      ctx.fillRect(this.x, this.y, this.w, this.h);
      ctx.fillStyle = '#fff';
      ctx.fillRect(this.x + 10, this.y + 10, 8, 8);
      ctx.fillRect(this.x + 26, this.y + 10, 8, 8);
    }

    // Attack effect
    if (this.attacking && this.attackTimer > 8) {
      const box = this.getAttackBox();
      if (box) {
        ctx.save();
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = '#ffff00';
        ctx.fillRect(box.x, box.y, box.w, box.h);
        ctx.globalAlpha = 1;
        ctx.restore();
      }
    }
  }
}

// ─── Enemy ─────────────────────────────────────────────────────────────────────
class Enemy {
  constructor(type, x) {
    this.type = type; // 'slime' | 'goblin'
    this.x = x;
    this.y = type === 'slime' ? GROUND - 32 : GROUND - 48;
    this.w = type === 'slime' ? 32 : 40;
    this.h = type === 'slime' ? 32 : 48;
    this.vx = type === 'slime' ? (Math.random() > 0.5 ? 2 : -2) : 0;
    this.vy = 0;
    this.state = 'idle';
    this.frame = 0;
    this.frameTimer = 0;
    this.health = type === 'slime' ? 1 : 2;
    this.dead = false;
    this.dying = false;
    this.dyingTimer = 0;
    this.attackCooldown = 0;
    this.attackRange = type === 'slime' ? 30 : 45;
    this.facing = 1;
    this.squish = 1;
    this.squishTimer = 0;
    this.gravity = type === 'slime' ? 0 : GRAVITY;
    this.groundY = this.y;
  }

  update(player) {
    if (this.dead) return;
    if (this.dying) {
      this.dyingTimer++;
      this.squish *= 0.85;
      if (this.dyingTimer > 20) this.dead = true;
      return;
    }

    const dx = player.x - this.x;
    const dy = player.y - this.y;
    this.facing = dx > 0 ? 1 : -1;

    if (this.type === 'slime') {
      // Bounce: reverse at edges
      this.x += this.vx;
      if (this.x <= 10 || this.x + this.w >= W - 10) this.vx *= -1;
      // Bounce squish
      this.squishTimer++;
      this.squish = 1 + Math.sin(this.squishTimer * 0.15) * 0.15;
    } else {
      // Goblin AI
      const dist = Math.abs(dx);
      if (dist < this.attackRange && this.attackCooldown <= 0) {
        this.state = 'attack';
        this.attackCooldown = 60;
      } else if (dist < 200) {
        this.state = 'walk';
        this.x += this.facing * 1.5;
      } else {
        this.state = 'idle';
      }

      this.gravity = GRAVITY;
      this.vy += this.gravity;
      this.y += this.vy;
      if (this.y + this.h >= GROUND) {
        this.y = GROUND - this.h;
        this.vy = 0;
      }

      if (this.attackCooldown > 0) this.attackCooldown--;
    }

    // Animation
    this.frameTimer++;
    const frameSpeed = this.type === 'slime' ? 8 : (this.state === 'attack' ? 6 : 10);
    if (this.frameTimer >= frameSpeed) {
      this.frameTimer = 0;
      const total = this.type === 'slime' ? 4 : (this.state === 'attack' ? 6 : 4);
      this.frame = (this.frame + 1) % total;
    }
  }

  takeDamage(amt) {
    this.health -= amt;
    if (this.health <= 0) {
      this.dying = true;
      const color = this.type === 'slime' ? '#44ff44' : '#ff8800';
      spawnParticles(this.x + this.w/2, this.y + this.h/2, color, 10);
      return true;
    }
    spawnParticles(this.x + this.w/2, this.y + this.h/4, '#ffaa00', 4);
    return false;
  }

  getHitBox() {
    return { x: this.x + 4, y: this.y + 4, w: this.w - 8, h: this.h - 8 };
  }

  draw() {
    if (this.dead) return;
    ctx.save();

    if (this.type === 'slime') {
      const spr = SPRITES.slime;
      if (spr.loaded && spr.img.complete) {
        ctx.translate(this.x + this.w/2, this.y + this.h);
        ctx.scale(this.squish, 2 - this.squish);
        ctx.drawImage(spr.img,
          (this.frame % 4) * spr.frameW, 0, spr.frameW, spr.frameH,
          -this.w/2, -this.h, this.w, this.h
        );
      } else {
        ctx.fillStyle = '#44cc44';
        ctx.beginPath();
        ctx.ellipse(this.x + this.w/2, this.y + this.h * 0.7, this.w/2 * this.squish, this.h/2 * (2-this.squish), 0, 0, Math.PI*2);
        ctx.fill();
      }
    } else {
      const spr = this.state === 'attack' ? SPRITES.goblinAttack : 
                   (this.state === 'walk' ? SPRITES.goblinWalk : SPRITES.goblinIdle);
      ctx.translate(this.x + this.w/2, this.y + this.h/2);
      ctx.scale(this.facing, 1);
      ctx.translate(-this.w/2, -this.h/2);

      if (spr.loaded && spr.img.complete) {
        const frames = this.state === 'attack' ? 6 : 4; // goblinWalk/Idle have 4 frames
        ctx.drawImage(spr.img,
          (this.frame % frames) * spr.frameW, 0, spr.frameW, spr.frameH,
          0, 0, this.w, this.h
        );
      } else {
        ctx.fillStyle = this.state === 'attack' ? '#ff4444' : '#8B4513';
        ctx.fillRect(0, 0, this.w, this.h);
        ctx.fillStyle = '#ff0';
        ctx.fillRect(8, 10, 8, 8);
        ctx.fillRect(22, 10, 8, 8);
      }
    }
    ctx.restore();
  }
}

// ─── Game ──────────────────────────────────────────────────────────────────────
class Game {
  constructor() {
    this.state = 'menu';
    this.player = null;
    this.enemies = [];
    this.score = 0;
    this.lives = 3;
    this.wave = 1;
    this.waveTimer = 0;
    this.spawnTimer = 0;
    this.difficulty = 1;
    this.shakeTimer = 0;
    this.scorePopups = [];
    this.time = 0;
  }

  start() {
    this.state = 'playing';
    this.player = new Player();
    this.enemies = [];
    this.score = 0;
    this.lives = 3;
    this.wave = 1;
    this.waveTimer = 0;
    this.spawnTimer = 0;
    this.difficulty = 1;
    this.shakeTimer = 0;
    this.scorePopups = [];
    particles = [];
    sfx.start();
  }

  spawnEnemy() {
    const r = Math.random();
    const type = this.wave < 3 && r < 0.7 ? 'slime' : (r < 0.5 ? 'slime' : 'goblin');
    const x = Math.random() > 0.5 ? -40 : W + 10;
    this.enemies.push(new Enemy(type, x));
  }

  addScore(pts, x, y) {
    this.score += pts;
    this.scorePopups.push({ x, y, text: '+' + pts, life: 60, color: pts >= 25 ? '#ffaa00' : '#44ff44' });
  }

  shake() { this.shakeTimer = 8; }

  update() {
    this.time++;
    if (this.shakeTimer > 0) this.shakeTimer--;

    if (this.state === 'menu') {
      if (isStart()) this.start();
      return;
    }
    if (this.state === 'gameover') {
      if (isStart()) this.start();
      return;
    }

    // Playing
    this.player.update();

    // Difficulty ramp
    this.waveTimer++;
    if (this.waveTimer >= 600) {
      this.waveTimer = 0;
      this.difficulty = Math.min(this.difficulty + 0.3, 5);
      this.wave++;
    }

    // Spawn
    this.spawnTimer++;
    const spawnRate = Math.max(120 - this.difficulty * 20, 40);
    if (this.spawnTimer >= spawnRate) {
      this.spawnTimer = 0;
      const count = 1 + Math.floor(this.difficulty / 2);
      for (let i = 0; i < count; i++) this.spawnEnemy();
    }

    // Update enemies
    for (const e of this.enemies) {
      e.update(this.player);
    }

    // Remove dead
    this.enemies = this.enemies.filter(e => !e.dead);

    // Collision: player attack vs enemies
    const atkBox = this.player.getAttackBox();
    if (atkBox) {
      for (const e of this.enemies) {
        if (e.dying) continue;
        const hb = e.getHitBox();
        if (this.boxOverlap(atkBox, hb)) {
          const pts = e.type === 'slime' ? 10 : 25;
          if (e.takeDamage(1)) {
            this.addScore(pts, e.x, e.y);
            if (e.type === 'slime') sfx.killSlime(); else sfx.killGoblin();
          }
        }
      }
    }

    // Collision: enemies vs player
    for (const e of this.enemies) {
      if (e.dying) continue;
      const hb = e.getHitBox();
      const pb = { x: this.player.x + 8, y: this.player.y + 8, w: this.player.w - 16, h: this.player.h - 16 };
      if (this.boxOverlap(hb, pb)) {
        // Check if player is attacking and above enemy (stomp)
        if (this.player.vy > 0 && this.player.y + this.player.h < e.y + e.h/2 + 10) {
          // Stomp kills slimes
          if (e.type === 'slime' && !e.dying) {
            e.takeDamage(1);
            this.addScore(10, e.x, e.y);
            this.player.vy = -8;
            sfx.killSlime();
          } else {
            this.player.takeDamage();
            this.shake();
          }
        } else {
          this.player.takeDamage();
          this.shake();
          // Knockback
          this.player.vx = (this.player.x < e.x ? -6 : 6);
          this.player.vy = -5;
        }
      }
    }

    // Lives check
    if (this.player.invincible === 1) {
      // just ran out
    }

    // Score popups
    for (let i = this.scorePopups.length - 1; i >= 0; i--) {
      this.scorePopups[i].life--;
      this.scorePopups[i].y -= 1;
      if (this.scorePopups[i].life <= 0) this.scorePopups.splice(i, 1);
    }

    updateParticles();

    // Check game over
    if (this.lives <= 0 && this.state === 'playing') {
      this.state = 'gameover';
      sfx.gameover();
    }
  }

  boxOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  drawBackground() {
    // Sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, GROUND);
    grad.addColorStop(0, '#1a1a3a');
    grad.addColorStop(1, '#2d1b4e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Stars
    ctx.fillStyle = '#ffffff';
    for (let i = 0; i < 60; i++) {
      const sx = (i * 137) % W;
      const sy = (i * 73) % (GROUND - 50);
      const blink = Math.sin(this.time * 0.05 + i) > 0.7 ? 2 : 1;
      ctx.fillRect(sx, sy, blink, blink);
    }

    // Moon
    ctx.fillStyle = '#ffffcc';
    ctx.beginPath();
    ctx.arc(680, 60, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a1a3a';
    ctx.beginPath();
    ctx.arc(690, 55, 26, 0, Math.PI * 2);
    ctx.fill();

    // Distant hills
    ctx.fillStyle = '#1e0a3a';
    ctx.beginPath();
    ctx.moveTo(0, GROUND);
    for (let x = 0; x <= W; x += 20) {
      const hy = GROUND - 40 - Math.sin(x * 0.02) * 30 - Math.sin(x * 0.005) * 20;
      ctx.lineTo(x, hy);
    }
    ctx.lineTo(W, GROUND);
    ctx.fill();

    // Ground
    ctx.fillStyle = '#2d1a0a';
    ctx.fillRect(0, GROUND, W, H - GROUND);
    ctx.fillStyle = '#4a3520';
    ctx.fillRect(0, GROUND, W, 8);
    // Ground texture
    ctx.fillStyle = '#3a2815';
    for (let x = 0; x < W; x += 40) {
      ctx.fillRect(x, GROUND + 12, 30, 4);
      ctx.fillRect(x + 15, GROUND + 24, 20, 4);
    }

    // Platform hints
    ctx.fillStyle = '#5a4030';
    ctx.fillRect(200, GROUND - 60, 120, 8);
    ctx.fillRect(500, GROUND - 90, 120, 8);
  }

  drawHUD() {
    // Hearts
    for (let i = 0; i < 3; i++) {
      const hx = 20 + i * 38;
      const hy = 20;
      if (i < this.lives) {
        ctx.fillStyle = '#ff2244';
        this.drawHeart(hx, hy, 30);
      } else {
        ctx.fillStyle = '#444';
        this.drawHeart(hx, hy, 30);
      }
    }

    // Score
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px "Courier New"';
    ctx.textAlign = 'right';
    ctx.fillText('SCORE: ' + this.score, W - 20, 38);

    // Wave
    ctx.fillStyle = '#aaa';
    ctx.font = '14px "Courier New"';
    ctx.fillText('WAVE ' + this.wave, W - 20, 58);

    // Score popups
    for (const p of this.scorePopups) {
      ctx.globalAlpha = p.life / 60;
      ctx.fillStyle = p.color;
      ctx.font = 'bold 18px "Courier New"';
      ctx.textAlign = 'center';
      ctx.fillText(p.text, p.x, p.y);
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }

  drawHeart(x, y, size) {
    const s = size / 30;
    ctx.beginPath();
    ctx.moveTo(x, y + 6*s);
    ctx.bezierCurveTo(x, y, x - 10*s, y, x - 10*s, y + 8*s);
    ctx.bezierCurveTo(x - 10*s, y + 16*s, x, y + 22*s, x, y + 26*s);
    ctx.bezierCurveTo(x, y + 22*s, x + 10*s, y + 16*s, x + 10*s, y + 8*s);
    ctx.bezierCurveTo(x + 10*s, y, x, y, x, y + 6*s);
    ctx.fill();
  }

  drawMenu() {
    // Title screen
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0a0a20');
    grad.addColorStop(1, '#1a0a30');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Animated title
    ctx.save();
    ctx.textAlign = 'center';

    const pulse = Math.sin(this.time * 0.05) * 5;
    ctx.shadowColor = '#ff2244';
    ctx.shadowBlur = 20 + pulse;
    ctx.fillStyle = '#ff2244';
    ctx.font = 'bold 72px "Courier New"';
    ctx.fillText('SLIME', W/2, 160);
    ctx.fillStyle = '#ffdd44';
    ctx.fillText('SLAYER', W/2, 240);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#aaa';
    ctx.font = '18px "Courier New"';
    ctx.fillText('A Knight vs Monsters Platformer', W/2, 290);

    const blink = Math.sin(this.time * 0.1) > 0;
    if (blink) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 22px "Courier New"';
      ctx.fillText('PRESS SPACE TO START', W/2, 380);
    }

    ctx.fillStyle = '#666';
    ctx.font = '14px "Courier New"';
    ctx.fillText('ARROWS = Move   SHIFT = Jump   SPACE = Attack', W/2, 440);
    ctx.restore();
  }

  drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#ff2244';
    ctx.font = 'bold 64px "Courier New"';
    ctx.fillText('GAME OVER', W/2, 200);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px "Courier New"';
    ctx.fillText('SCORE: ' + this.score, W/2, 270);
    ctx.fillStyle = '#aaa';
    ctx.font = '18px "Courier New"';
    ctx.fillText('Wave Reached: ' + this.wave, W/2, 310);

    const blink = Math.sin(this.time * 0.1) > 0;
    if (blink) {
      ctx.fillStyle = '#ffdd44';
      ctx.font = 'bold 20px "Courier New"';
      ctx.fillText('PRESS SPACE TO RESTART', W/2, 380);
    }
    ctx.textAlign = 'left';
  }

  render() {
    ctx.save();
    if (this.shakeTimer > 0) {
      ctx.translate(
        (Math.random() - 0.5) * 6,
        (Math.random() - 0.5) * 6
      );
    }

    if (this.state === 'menu') {
      this.drawMenu();
    } else {
      this.drawBackground();

      // Draw enemies behind player if below, in front if above
      const behind = this.enemies.filter(e => e.y >= this.player.y);
      const front = this.enemies.filter(e => e.y < this.player.y);
      for (const e of behind) e.draw();
      this.player.draw();
      for (const e of front) e.draw();

      drawParticles();
      this.drawHUD();

      if (this.state === 'gameover') this.drawGameOver();
    }
    ctx.restore();
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
const game = new Game();

// ─── Main Loop ────────────────────────────────────────────────────────────────
let lastTime = 0;
const targetFPS = 60;
const frameInterval = 1000 / targetFPS;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);

  const delta = timestamp - lastTime;
  if (delta < frameInterval) return;
  lastTime = timestamp - (delta % frameInterval);

  game.update();
  game.render();
  clearJustPressed();
}

// Wait for sprites to load
let spritesReady = 0;
const totalSprites = Object.keys(SPRITES).length;
for (const key in SPRITES) {
  const spr = SPRITES[key];
  spr.img.onload = () => { spr.loaded = true; spritesReady++; };
  spr.img.onerror = () => { spr.loaded = false; spritesReady++; };
}
// If images already cached
setTimeout(() => {
  for (const key in SPRITES) {
    if (SPRITES[key].img.complete) SPRITES[key].loaded = true;
  }
}, 100);

requestAnimationFrame(gameLoop);
</script>
